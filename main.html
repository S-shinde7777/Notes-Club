<!-- ================= MAIN PAGE (main.html) ================= --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{background:#020617;color:#fff}
.container{max-width:1100px;margin:auto;padding:20px}
.title{font-size:28px;margin-bottom:20px}
.selects{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
select{padding:12px;border-radius:12px;border:none;background:#0f172a;color:#fff}
.tabs{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.tabs button{padding:10px 18px;border:none;border-radius:25px;background:#0f172a;color:#fff;cursor:pointer}
.tabs button.active{background:#38bdf8;color:#000}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px}
.card{background:#0f172a;padding:18px;border-radius:15px;transition:.3s;box-shadow:0 5px 20px rgba(0,0,0,.3)}
.card:hover{transform:translateY(-6px)}
.card h3{margin-bottom:10px}
.card a{display:inline-block;margin-top:10px;padding:8px 15px;background:#38bdf8;color:#000;border-radius:8px;text-decoration:none}
.empty{text-align:center;margin-top:20px;color:#64748b}
@media(max-width:700px){.selects{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="title">📚 Select Your Resources</div><div class="selects">
<select id="branch" onchange="updateSubjects()">
<option value="">Branch</option>
<option>CSE</option>
<option>Mechanical</option>
<option>Civil</option>
</select><select id="sem" onchange="updateSubjects()">
<option value="">Semester</option>
<option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
</select><select id="subject">
<option value="">Subject</option>
</select>
</div><div class="tabs">
<button onclick="showData('Notes',this)">Notes</button>
<button onclick="showData('Question',this)">Papers</button>
<button onclick="showData('Answer',this)">Answers</button>
</div><div id="output" class="grid"></div>
</div><script>
const subjectsData={
"CSE-1":["BMS","ENG"],
"CSE-2":["AMS","PIC"],
"CSE-3":["DSU","DBMS","OOP","DTE"],
"CSE-4":["JPR","DCN","MIC"],
"CSE-5":["OSY","STE"],
"CSE-6":["SFT","MAN","ETI"],
"Mechanical-1":["BMS","ENG"],
"Mechanical-3":["FM","Thermo"],
"Mechanical-4":["TOM","Hydraulics"],
"Civil-1":["BMS","ENG"],
"Civil-3":["Surveying"],
"Civil-4":["Structure","Geotech"]
};

const materials=[
{branch:'CSE',sem:'4',subject:'JPR',type:'Notes',title:'Unit 6 Notes',link:'https://drive.google.com/file/d/1gYaqLewtxDMpfPWlNIGKCGW0Q6XADAeu/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'JPR',type:'Question',title:'2025 S Paper',link:'https://drive.google.com/file/d/1mxZcVua0ud64VsSkVjTOMW6tRCSklVV2/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'DCN',type:'Answer',title:'Solved Paper',link:'https://drive.google.com/file/d/1aggG96gDllzoyPBP-hM8-kILfyuQA7DV/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'DCN',type:'Answer',title:'Solved Paper',link:'https://drive.google.com/file/d/1X0zYWo2dZGiiKj8wj4Vmz0LcjwMIF0H7/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'DCN',type:'Notes',title:'DCN ALL Unit Notes',link:'https://drive.google.com/file/d/1YD49gqDYzjcdgmUnSFLft_hNU-n96DfC/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'DCN',type:'Question',title:'2025 W Paper',link:'https://drive.google.com/file/d/1aIyQYhhW5moR_y_h8316mUDfFb399ntg/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'DCN',type:'Question',title:'2023 S Paper',link:'https://drive.google.com/file/d/1q4xoShTQVUk81qYQ_8ZNByYKR9oVahnR/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'MIC',type:'Answer',title:'Solved Paper 2017',link:'https://drive.google.com/file/d/1keGFNa1dJyD4ajJMYdVjUr-aA2q2WoVz/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'MIC',type:'Answer',title:'Solved Paper 2017',link:'https://drive.google.com/file/d/1tYfb_49JoZORq8vSU_gYzDA_RLW_2CL3/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'MIC',type:'Question',title:'2025 S Paper',link:'https://drive.google.com/file/d/12_TAVK5lfCd0QsV4e6ss6YGwAQVTTAYc/view?usp=drivesdk'},
{branch:'CSE',sem:'4',subject:'MIC',type:'Notes',title:'MIC ALL Unit Notes',link:'https://drive.google.com/file/d/14cxhN1WGlgpvX_Vqgq8M4rM-bUxjuV-M/view?usp=drivesdk'},

];

function updateSubjects(){
let b=document.getElementById('branch').value;
let s=document.getElementById('sem').value;
let sub=document.getElementById('subject');
sub.innerHTML='<option value="">Subject</option>';
let key=`${b}-${s}`;
if(subjectsData[key]){
subjectsData[key].forEach(x=>{
let opt=document.createElement('option');
opt.text=x; sub.add(opt);
});
}
}

function showData(type,btn){
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

let b=document.getElementById('branch').value;
let s=document.getElementById('sem').value;
let sub=document.getElementById('subject').value;

let res=materials.filter(x=>x.branch==b&&x.sem==s&&x.subject==sub&&x.type==type);

let out='';
res.forEach(x=>{
out+=`<div class='card'><h3>${x.title}</h3><a href='${x.link}' target='_blank'>Download</a></div>`;
});

document.getElementById('output').innerHTML=out||"<div class='empty'>No material found</div>";
}
</script></body>
</html>
